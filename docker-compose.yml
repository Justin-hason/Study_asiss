version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: study-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./knowledge-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: study-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: study-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: study-es
    environment:
      - cluster.name=study-es
      - node.name=study-es
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging: *default-logging

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: study-milvus
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGE_TYPE: local
    ports:
      - "19530:19530"
    volumes:
      - milvusdata:/var/lib/milvus
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging: *default-logging

  kafka:
    image: apache/kafka:3.7.0
    container_name: study-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: study-kafka-cluster
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging: *default-logging

  knowledge-service:
    build:
      context: ./knowledge-service
      dockerfile: Dockerfile
    container_name: study-knowledge
    ports:
      - "8001:8000"
      - "9001:9000"
    environment:
      SERVER_ADDR: ":8000"
      GRPC_ADDR: ":9000"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/knowledge?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  generate-service:
    build:
      context: ./generate-service
      dockerfile: Dockerfile
    container_name: study-generate
    ports:
      - "8002:8000"
    environment:
      SERVER_ADDR: ":8000"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-secret-change-in-production"
      DEFAULT_MODEL: "default"
      MODEL_DEFAULT_PROVIDER: "openai"
      MODEL_DEFAULT_ID: "gpt-4o"
      MODEL_DEFAULT_BASE_URL: "https://api.openai.com/v1"
      MODEL_DEFAULT_API_KEY: ""
      FALLBACK_MODEL: "gpt-3.5-turbo"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: study-admin
    ports:
      - "8000:8000"
    environment:
      SERVER_ADDR: ":8000"
      POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/knowledge?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-secret-change-in-production"
      ADMIN_ROLE: "admin"
      KNOWLEDGE_SERVICE_URL: "http://knowledge-service:8000"
      GENERATE_SERVICE_URL: "http://generate-service:8000"
      SEARCH_SERVICE_URL: "http://search-service:8000"
      PIPELINE_SERVICE_URL: "http://pipeline-service:8000"
      LEARN_SERVICE_URL: "http://learn-service:8000"
      SENSITIVE_WORDS: "赌博,色情,暴力,毒品,诈骗,反动,恐怖,分裂"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      knowledge-service:
        condition: service_started
      generate-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: study-search
    ports:
      - "8010:8000"
    environment:
      SERVER_ADDR: ":8000"
      MILVUS_ADDR: "milvus:19530"
      ES_ADDR: "http://elasticsearch:9200"
      EMBEDDING_SERVICE_URL: "http://embedding-service:8000"
      RERANKER_SERVICE_URL: "http://reranker-service:8000"
      JWT_SECRET: "dev-secret-change-in-production"
      DEFAULT_TOP_K: "100"
      DEFAULT_TOP_N: "5"
      DEFAULT_ALPHA: "0.7"
      DEFAULT_THRESHOLD: "0.3"
      RRF_K: "60"
      RRF_M: "20"
    depends_on:
      milvus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  reranker-service:
    build:
      context: ./reranker-service
      dockerfile: Dockerfile
    container_name: study-reranker
    ports:
      - "8011:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  pipeline-service:
    image: alpine:3.19
    container_name: study-pipeline
    ports:
      - "8020:8000"
    command: >
      sh -c "
        echo '#!/bin/sh' > /serve.sh &&
        echo 'while true; do' >> /serve.sh &&
        echo '  echo -e \"HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n{\\\"status\\\":\\\"ok\\\",\\\"service\\\":\\\"pipeline\\\"}\" | nc -l -p 8000 -q 1' >> /serve.sh &&
        echo 'done' >> /serve.sh &&
        chmod +x /serve.sh &&
        apk add --no-cache netcat-openbsd &&
        /serve.sh
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  learn-service:
    image: alpine:3.19
    container_name: study-learn
    ports:
      - "8030:8000"
    command: >
      sh -c "
        echo '#!/bin/sh' > /serve.sh &&
        echo 'while true; do' >> /serve.sh &&
        echo '  echo -e \"HTTP/1.1 200 OK\r\nContent-Type: application/json\r\n\r\n{\\\"status\\\":\\\"ok\\\",\\\"service\\\":\\\"learn\\\"}\" | nc -l -p 8000 -q 1' >> /serve.sh &&
        echo 'done' >> /serve.sh &&
        chmod +x /serve.sh &&
        apk add --no-cache netcat-openbsd &&
        /serve.sh
      "
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  pgdata:
  miniodata:
  esdata:
  milvusdata:
  kafkadata:
