global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker Desktop 中访问宿主机服务使用 host.docker.internal。
  # 当前后端未实现 /metrics 时，该 target 会显示为 down，但不会影响 Prometheus/Grafana 启动。
  - job_name: 'study-backend'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
